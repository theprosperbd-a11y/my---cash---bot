<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cash Bot</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#1f2937;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    text-align:center;
}
button{
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#0099ff;
    color:white;
}
</style>
</head>

<body>

<div class="container">
<h1>Welcome to My Cash Bot</h1>
<p>Telegram Mini App Ready!</p>
<button onclick="startReward()">Start</button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwKATLwLcZ7gZlK0tcb2kBXrZ9n-Kf_gyNxo5UY50W6BwWnBSDHZiMsSFYezXmRzKOG/exec";

const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

alert(JSON.stringify(tg.initDataUnsafe));

function startReward(){

    const user = tg.initDataUnsafe.user;

    if(!user){
        alert("Telegram User পাওয়া যায়নি!");
        return;
    }

    fetch(API_URL,{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            userId:user.id,
            name:user.first_name,
            amount:1
        })
    })
    .then(response=>response.json())
    .then(data=>{
        alert("Reward Added Successfully!");
    })
    .catch(error=>{
        alert("Error: "+error);
        console.log(error);
    });

}
</script>

</body>
</html>
