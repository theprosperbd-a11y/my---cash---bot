<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cash Bot</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="//libtl.com/sdk.js" data-zone="11375484" data-sdk="show_11375484"></script>

<style>
body{
    font-family:Arial,sans-serif;
    background:#1f2937;
    color:#fff;
    text-align:center;
    padding:40px;
}
button{
    padding:15px 25px;
    font-size:18px;
    background:#0088cc;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>Welcome to My Cash Bot</h1>
<p>Telegram Mini App Ready!</p>

<button onclick="showMessage()">Start</button>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwKATLwLcZ7gZlK0tcb2kBXrZ9n-Kf_gyNxo5UY50W6BwWnBSDHZiMsSFYezXmRzKOG/exec";

const tg = window.Telegram.WebApp;
tg.expand();

function showMessage() {

    alert("Button Clicked!");

    if (typeof show_11375484 !== "function") {
        alert("Monetag SDK Loaded হয়নি!");
        return;
    }

    const user = tg.initDataUnsafe.user;

    if (!user) {
        alert("Telegram User পাওয়া যায়নি!");
        return;
    }

    show_11375484()
    .then(() => {
        return fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                userId: user.id,
                name: user.first_name,
                amount: 1
            })
        });
    })
    .then(res => res.json())
    .then(data => {
        alert("Reward Added Successfully!");
    })
    .catch(err => {
        console.error(err);
        alert("Error: " + err.message);
    });

}
</script>

</body>
</html>
